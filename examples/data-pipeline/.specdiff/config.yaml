model: gemini-3.1-flash-lite-preview
output_dir: src
specs_dir: .specdiff
language: python
test_framework: pytest
# TODO: remove `|| true` once the sequential pipeline lands (Phase 5) --
# right now the parallel pipeline can generate tests with mismatched
# imports, which would roll back valid code.
test_command: PYTHONPATH=src pytest src/tests/ --rootdir=. -q || true
